# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: pcc.custfiles.zcustomerfilesv2
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: KR5
          url: https://my5500851.payroll.hr.cloud.sap
          client: '100'
        app:
          name: ZCUSTFILESV2
          description: PCC customer files V2
          package: ZHR_PCC_V2
          transport: KR5K900026
        exclude:
          - /test/
