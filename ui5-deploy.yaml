# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: pcc.custfiles.zcustomerfiles
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: G5J
          url: https://my551014.payroll.hr.cloud.sap
          client: '100'
        app:
          name: ZCUSTFILES
          description: PCC customer files
          package: ZHR_PCC_FIORI
          transport: G5JK900070
        exclude:
          - /test/
